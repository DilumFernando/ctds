# Run Details
run_name: nets_interpolant_overdamped_unnamed
run_group: nets
wandb: false
wandb_project: ${oc.env:WANDB_PROJECT, null}
checkpoint: null

# Objective Details
x_dim: 2
density_path: interpolant
target: fab_gmm
cov_scale: 1.0
source_std: 2.0

# Training details
num_devices: 1
max_epochs: 800
lr: 0.002
lr_burn_in_epochs: 150
step_size: 5
gamma: 0.97
checkpoint_burn_in_epochs: 150

# Batching details
use_persistent_sample_buffer: true
persistent_sample_buffer_trajectories: 500
train_batch_size: 10000
train_trajectories: 400
train_steps_per_epoch: 10
val_batch_size: 50000
val_trajectories: 1000
val_steps_per_epoch: 1
val_freq: 5

# PINN-specific training details
annealing_scheduler: constant
start_T: 1.0
avg_dt: 0.01
record_every: 1
divergence_mode: autograd

# Control-specific details
control: mlp
control_hiddens: [256, 256, 256, 256]

# Free-energy specific details
free_energy: mlp
free_energy_hiddens: [256, 256, 256]

# Time-encoding details
use_fourier: false
fourier_dim: 20

# Proposal details
proposal: overdamped_langevin
damping: 50
use_jarzynski: false

# TODO: metrics used
verbose: false
memory_profile: false


