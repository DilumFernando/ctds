# Implementation of Inertial NETS on the 40-mode GMM from FAB

# Run Details
run_name: nets_interpolant_esh_unnamed
run_group: nets
wandb: false
wandb_project: ${oc.env:WANDB_PROJECT, null}
checkpoint: null

# Objective Details
x_dim: 2
density_path: interpolant
target: fab_gmm
cov_scale: 0.25
source_std: 2.0

# Training details
num_devices: 1
max_epochs: 500
lr: 0.002
step_size: 50
gamma: 1.0

# Batching details
use_persistent_sample_buffer: true
persistent_sample_buffer_trajectories: 500
train_batch_size: 40000
train_trajectories: 400
train_steps_per_epoch: 500
val_batch_size: 50000
val_trajectories: 1000
val_steps_per_epoch: 1
val_freq: 5

# PINN-specific training details
annealing_scheduler: constant
start_T: 1.0
avg_dt: 0.001
record_every: 5
divergence_mode: autograd

# Control-specific details
control: mlp
control_hiddens: [256, 256, 256, 256]

# Free-energy specific details
free_energy: mlp
free_energy_hiddens: [256, 256, 256]

# Encoding details
use_fourier: true
x_fourier_dim: 100
x_fourier_sigma: 0.1
t_fourier_dim: 20
t_fourier_sigma: 5

# Proposal details
proposal: underdamped_langevin
scale: 50.0
damping: 0.0
mass: 15.0
hamiltonian_type: esh
use_jarzynski: false

# TODO: metrics used
verbose: false
memory_profile: false


